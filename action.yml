name: ci-delta

description: Semantic diff reports for CI/CD config changes

author: tengfone

inputs:
  provider:
    description: github-actions for v0
    required: false
    default: github-actions
  comment:
    description: Post or update a PR comment
    required: false
    default: "true"
  fail-on:
    description: Severity threshold that fails the check
    required: false
    default: none
  format:
    description: markdown or json
    required: false
    default: markdown
  github-token:
    description: GitHub token used to read workflow files and post PR comments
    required: false
    default: ${{ github.token }}

runs:
  using: node24
  main: dist/action.js

branding:
  icon: git-pull-request
  color: blue
